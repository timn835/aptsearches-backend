AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'aptsearches-backend

  Sample SAM Template for aptsearches-backend

  '
Globals:
  Function:
    Timeout: 3
Resources:
  APTSearchesScraper1:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: APTSearchesScraper1
      Handler: app.scrape1Handler
      Runtime: nodejs20.x
      Architectures:
      - x86_64
      Environment:
        Variables:
          NODE_OPTIONS: ' --enable-source-maps'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - src/app.ts
        External:
        - dotenv
        Minify: true
        Sourcemap: true
        Target: es2022
      SamResourceId: APTSearchesScraper1
  APTSearchesSender1:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: APTSearchesSender1
      Handler: app.send1Handler
      Runtime: nodejs20.x
      Architectures:
      - x86_64
      Environment:
        Variables:
          NODE_OPTIONS: ' --enable-source-maps'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - src/app.ts
        External:
        - dotenv
        Minify: true
        Sourcemap: true
        Target: es2022
      SamResourceId: APTSearchesSender1
  APTSearchesAPI:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: APTSearchesAPI
      Handler: app.handler
      Runtime: nodejs20.x
      Architectures:
      - x86_64
      Description: Backend api for APTSearches
      Events:
        ApiGateway:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
      Policies:
      - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          NODE_OPTIONS: ' --enable-source-maps'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        External:
        - dotenv
        Minify: true
        Sourcemap: true
        Target: es2022
      SamResourceId: APTSearchesAPI
